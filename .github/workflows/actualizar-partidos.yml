name: Actualizar partidos

on:
  # Cada 6 horas
  schedule:
    - cron: '0 */6 * * *'
  # También se puede ejecutar manualmente desde GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Ejecutar script de actualización
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/actualizar-partidos.mjs

      - name: Comprobar si hay cambios
        id: cambios
        run: |
          git diff --quiet src/data/partidos.ts && echo "hay_cambios=false" >> $GITHUB_OUTPUT || echo "hay_cambios=true" >> $GITHUB_OUTPUT

      - name: Commit y push si hay cambios
        if: steps.cambios.outputs.hay_cambios == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/partidos.ts
          git commit -m "datos: actualizar partidos $(date -u +%Y-%m-%d_%H:%M)"
          git push
